<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy birthday!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎂</text></svg>">
    <style id="dynamic-style">
        /* 初始样式 */
        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            color: #333;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: all 0.8s ease;
            overflow: hidden;
            cursor: crosshair;
        }
        #code-stream {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            padding: 24px;
            box-sizing: border-box;
            overflow-y: auto;
            white-space: pre-wrap;
            z-index: 10;
            font-size: 14px;
            line-height: 1.6;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            pointer-events: none;
            transition: height 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #visual-canvas {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: height 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #ff6b6b;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            border-radius: 50%;
            animation: fly 0.8s ease-out forwards;
        }
        @keyframes fly {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--dr)); opacity: 0; }
        }

        .token-comment { color: #aaa; }
        .token-selector { color: #e91e63; }
        .token-property { color: #2196f3; }
        .token-value { color: #4caf50; }
        .token-punctuation { color: #999; }
    </style>
</head>
<body>
    <pre id="code-stream"><code id="code-content"></code><span class="cursor"></span></pre>
    <div id="visual-canvas"></div>

    <script>
        const codeContent = document.getElementById('code-content');
        const codeStream = document.getElementById('code-stream');
        const dynamicStyle = document.getElementById('dynamic-style');
        const visualCanvas = document.getElementById('visual-canvas');

        let fullRawText = "";

        const acts = [
            {
                name: "Act 1: Environment",
                type: "css",
                content: `/* 
 * 正在加载心意...
 * 正在偷偷给生日主角准备特调视觉包 🎁
 */

body {
    background: #fffcf9;
}
/* 先把舞台布置好，灯光师请就位 💡 */
#code-stream {
    height: 40%;
    background: rgba(255, 255, 255, 0.9);
    border-top: 1px solid #f0f0f0;
    pointer-events: auto;
}
/* 白色太单调了，换个让人心情变好的奶油色背景 ✨ */
#visual-canvas {
    height: 60%;
    background: radial-gradient(circle, #ffffff 0%, #fff0f0 100%);
}
`
            },
            {
                name: "Act 2: Architecture",
                type: "dom",
                content: `
<div class="cake-container">
    <div class="candle">
        <div class="flame" id="main-flame"></div>
    </div>
    <div class="layer layer-top">
        <div class="sprinkles"></div>
    </div>
    <div class="layer layer-middle">
        <div class="sprinkles"></div>
    </div>
    <div class="layer layer-bottom">
        <div class="sprinkles"></div>
    </div>
    <div class="plate"></div>
</div>`
            },
            {
                name: "Act 2.1: Geometric Styling",
                type: "css",
                content: `


/* 重点来了！主厨上线，开始烘焙数字蛋糕 🎂 */

.cake-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 50px;
}

/* 哎呀，位置有点歪，往中间挪挪 🤏 */

.layer {
    position: relative;
    border-radius: 15px 15px 5px 5px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    margin-bottom: -5px;
    z-index: 2;
}
/* 框架搭好了，准备注入灵魂... */
/* 虚空召唤第一层：柠檬奶油，清爽加倍 🍋 */
.layer-top    { width: 120px; height: 55px; background: #ffd93d; z-index: 4; }
/* 虚空召唤第二层：香草草莓，甜度预警 🍓 */
.layer-middle { width: 180px; height: 75px; background: #fff5e1; z-index: 3; }
/* 虚空召唤第三层：厚实的天鹅绒基底 🍰 */
.layer-bottom { width: 240px; height: 95px; background: #ff85a2; z-index: 2; }
/* 仪式感不能少，拿出一个精致的小盘子垫好 🍽️ */
.plate {
    width: 300px;
    height: 15px;
    background: #f0f0f0;
    border-radius: 50%;
    margin-top: 5px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}
`
            },
            {
                name: "Act 2.2: Candy Decorations",
                type: "css",
                content: `/* 接下来是“亿点点”细节装饰... */
.sprinkles {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    overflow: hidden;
    pointer-events: none;
}

/* 撒下彩色糖粒，像不像星星掉进蛋糕里了？⭐ */
.sprinkles::before {
    content: '';
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    box-shadow: 
        20px 25px #ff6b6b, 60px 15px #6bcbff, 100px 30px #4caf50,
        40px 45px #9c27b0, 85px 50px #ff9d00, 140px 20px #e91e63,
        180px 40px #2196f3, 210px 25px #ffd93d, 10px 60px #4caf50;
    opacity: 0.8;
}

.layer::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 25px;
    background: rgba(255,255,255,0.35);
    border-radius: 15px 15px 20px 20px;
}
`
            },
            {
                name: "Act 3: The Flame",
                type: "css",
                content: `
/* 噔噔噔噔！插上充满魔法的蜡烛，准备许愿吧 🕯️ */
.candle {
    width: 14px;
    height: 55px;
    background: repeating-linear-gradient(-45deg, #ff6b6b, #ff6b6b 6px, #fff 6px, #fff 12px);
    border-radius: 4px;
    margin-bottom: -5px;
    position: relative;
    z-index: 5;
}

.flame {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 32px;
    background: #ffcc33;
    border-radius: 50% 50% 20% 20%;
    box-shadow: 0 0 25px #ffcc33, 0 0 60px rgba(255, 204, 51, 0.4);
    animation: flicker 0.2s infinite alternate;
    cursor: pointer;
}

@keyframes flicker {
    to { transform: translateX(-50%) scale(1.1) rotate(3deg); filter: brightness(1.2); }
}
`
            },
            {
                name: "Act 4: Completion",
                type: "text",
                content: `

> 视觉重构完成。
> 几何结构校验：[OK]
> 糖果覆盖率：[100%]
> 生日也即将来到！
> 👸🏻👑💍💎🏰 🚢2️⃣5️⃣岁生日快乐🎊🎊🎊[烟花][烟花][烟花]🎉🎉🎉[礼物][礼物][礼物] 🩷❤🧡💛💚🩵💙💜🖤🩶🤍🤎❤️‍🔥❣️💕💞💓💗💖💝💘🥳🥳 🥳🤩🤩🤩（放声歌唱🗣🎙🎤🎵🎶 🎼）（兴奋爬上树🌴🌲🌳 🎄）（光翼展开飞行🧚‍♀️🧚🧚‍♂️）（健康♻️ 且适度✅ 地爬行💪🏻💪🏻💪🏻）（口哨～💋 💋💋）（露出很甜🎀💝💓 的笑容[坏笑][坏笑][坏笑]）（健康地蠕动🐛🐛🐛）（3600º 😵‍💫 螺旋式翻滚🌪🌪🌪）（拉着气球🎈飞向天空🌌🎆🎇）（撒下飞吻[嘴唇] 么么么😘😘😘）（展开瞬移魔法💫🔮🪄 来到宝贝面前）（激动💗 地跺脚🐾 🐾🐾）（兴奋地大喊🗣 🔊🔊🔊）（高声唱着生日歌🎂 🎉🎤 🎼〰🎵〰️🎶 〰）（跳着欢快的舞蹈💃🏻💃🏻💃🏻🪩🪇🪗）（献出精心💖 挑选的花束🍀🌸🌺🪷🌻🪻🌷🌹💐）（娇羞🥰🫣地递出🍀🌸🌺🪷🌻🪻🌷🌹💐）

[SYSTEM]: 这是为您烘焙的数字蛋糕。
[SYSTEM]: 它更加稳固，更加缤纷。
[SYSTEM]: 就像代码需要重构，生活也需要不断的优化与惊喜。

> 提示: 点击页面任意处释放彩色礼花。
> 点击蜡烛火焰许个愿并吹熄它。
`
            }
        ];

        function highlight(text) {
            return text
                .replace(/\/\*([\s\S]*?)\*\//g, '<span class="token-comment">/*$1*/</span>')
                .replace(/([a-z-]+\s*)(?=\{)/g, '<span class="token-selector">$1</span>')
                .replace(/([a-z-]+\s*)(?=:)/g, '<span class="token-property">$1</span>')
                .replace(/(:\s*)([^;]+)/g, '$1<span class="token-value">$2</span>')
                .replace(/([{}])/g, '<span class="token-punctuation">$1</span>');
        }

        async function typeWriter(text, type, speed = 15) {
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                fullRawText += char;
                if (type === 'css') dynamicStyle.innerHTML += char;
                codeContent.innerHTML = highlight(fullRawText);
                codeStream.scrollTop = codeStream.scrollHeight;
                await new Promise(r => setTimeout(r, speed + Math.random() * 8));
            }
            fullRawText += "\n\n";
        }

        function createFirework(x, y) {
            const colors = ['#ff6b6b', '#ffd93d', '#6bcbff', '#4caf50', '#e91e63', '#9c27b0'];
            for (let i = 0; i < 24; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 10 + 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 120 + 60;
                p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                p.style.setProperty('--dr', Math.random() * 720 + 'deg');
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        async function run() {
            document.addEventListener('mousedown', (e) => {
                createFirework(e.clientX, e.clientY);
            });

            for (const act of acts) {
                if (act.type === 'dom') {
                    visualCanvas.innerHTML = act.content;
                    setTimeout(() => {
                        const flame = document.getElementById('main-flame');
                        if(flame) flame.onclick = extinguish;
                    }, 100);
                } else {
                    await typeWriter(act.content, act.type);
                }
                await new Promise(r => setTimeout(r, 600));
            }
        }

        function extinguish(e) {
            if(e) e.stopPropagation();
            const flame = document.getElementById('main-flame');
            if (!flame) return;

            flame.style.transition = "all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55)";
            flame.style.opacity = "0";
            flame.style.transform = "translateX(-50%) scale(0) rotate(90deg)";

            const msg = document.createElement('div');
            msg.style.cssText = "color: #ff6b6b; font-size: 36px; text-align: center; font-weight: 800; animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;";
            msg.innerHTML = "✨ WISH GRANTED! ✨<br><span style='font-size:18px; color:#888; font-weight:normal;'>Keep Coding, Keep Dreaming.</span>";
            
            // 注入弹窗动画样式
            if(!document.getElementById('extra-anim')) {
                const s = document.createElement('style');
                s.id = 'extra-anim';
                s.innerHTML = "@keyframes pop { from { transform: scale(0.5); opacity:0; } to { transform: scale(1); opacity:1; } }";
                document.head.appendChild(s);
            }

            visualCanvas.innerHTML = "";
            visualCanvas.appendChild(msg);
        }

        window.onload = run;
    </script>
</body>
</html>
